<!DOCTYPE html>
<html>
<head>
    <title>Créer un animal</title>
</head>
<body>

    <h1>Nouvel animal</h1>

    {% if message %}
        <p style="color:red;">{{ message }}</p>
    {% endif %}

    <form method="POST">

        <label>Nom de l'animal :</label>
        <input type="text" name="nom" required>

        <br><br>

        <button type="submit">Créer</button>
    </form>

    <br>
    <a href="/">Retour</a>

</body>
</html>
